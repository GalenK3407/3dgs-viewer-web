<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3DGS Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed; top: 10px; left: 10px; color: white;
      font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.6);
      padding: 10px; border-radius: 6px; pointer-events: none; z-index: 10;
    }
    #crosshair {
      position: fixed; width: 12px; height: 12px; border: 2px solid #ff4444;
      border-radius: 50%; pointer-events: none; z-index: 10;
      transform: translate(-50%, -50%); display: none;
    }
    #exportPanel {
      position: fixed; top: 10px; right: 10px; color: white;
      font-family: monospace; font-size: 13px; background: rgba(0,0,0,0.75);
      padding: 12px 16px; border-radius: 8px; z-index: 20;
      min-width: 220px;
    }
    #exportPanel h3 { margin: 0 0 8px 0; font-size: 15px; color: #44ff44; }
    #exportPanel label { display: block; margin: 6px 0 2px; }
    #exportPanel select, #exportPanel input {
      width: 100%; padding: 4px; margin-bottom: 4px;
      background: #333; color: white; border: 1px solid #666; border-radius: 4px;
    }
    #exportPanel button {
      width: 100%; padding: 8px; margin-top: 8px; cursor: pointer;
      background: #44ff44; color: #000; border: none; border-radius: 4px;
      font-weight: bold; font-size: 14px;
    }
    #exportPanel button:hover { background: #66ff66; }
    #exportPanel button:disabled { background: #666; color: #999; cursor: not-allowed; }
    #exportProgress {
      margin-top: 8px; height: 6px; background: #333; border-radius: 3px; overflow: hidden;
    }
    #exportProgressBar {
      height: 100%; width: 0%; background: #44ff44; transition: width 0.1s;
    }
    #exportStatus { margin-top: 6px; font-size: 12px; color: #aaa; }
    #editPanel {
      position: fixed; left: 10px; bottom: 10px; color: white;
      font-family: monospace; font-size: 13px; background: rgba(0,0,0,0.8);
      padding: 12px 16px; border-radius: 8px; z-index: 20;
      width: 320px;
    }
    #editPanel h3 { margin: 0 0 8px 0; font-size: 15px; color: #ffbb44; }
    #editPanel label { display: block; margin: 6px 0 2px; }
    #editPanel input {
      width: 100%; padding: 4px; margin-bottom: 4px;
      background: #333; color: white; border: 1px solid #666; border-radius: 4px;
      box-sizing: border-box;
    }
    .toolRow {
      display: flex; gap: 6px; margin-top: 8px;
    }
    #editPanel button {
      flex: 1; padding: 8px; cursor: pointer;
      background: #444; color: white; border: 1px solid #666; border-radius: 4px;
      font-weight: bold; font-size: 12px;
    }
    #editPanel button:hover { background: #555; }
    #editPanel button:disabled { background: #333; color: #888; cursor: not-allowed; }
    #editPanel button.active {
      background: #ffbb44; color: black; border-color: #ffbb44;
    }
    #editHint {
      margin-top: 8px; font-size: 12px; color: #aaa; min-height: 32px;
    }
    #editStats {
      margin-top: 8px; font-size: 12px; color: #ccc; line-height: 1.5;
    }
    #selectionRect {
      position: fixed; border: 1px dashed #ffbb44; background: rgba(255,187,68,0.12);
      pointer-events: none; z-index: 30; display: none;
    }
    #brushCursor {
      position: fixed; border: 2px solid #ffbb44; background: rgba(255,187,68,0.08);
      border-radius: 50%; pointer-events: none; z-index: 30; display: none;
      transform: translate(-50%, -50%);
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="info">
    鼠标左键拖拽: 旋转视角 | 右键拖拽: 平移 | 滚轮: 缩放<br>
    WASD: 移动 | 双击模型: 设置环绕中心<br>
    R + 左键拖拽: 围绕中心环绕（左=顺时针, 右=逆时针）<br>
    <span style="color:#44ff44">+</span>: 添加关键帧 | <span style="color:#44ff44">P</span>: 播放/停止轨迹 | <span style="color:#44ff44">C</span>: 清除所有关键帧<br>
    <span style="color:#ffbb44">E</span>: 编辑模式 | <span style="color:#ffbb44">1/2</span>: Picker/Brush | <span style="color:#ffbb44">Del</span>: 删除所选 | <span style="color:#ffbb44">Ctrl+Z/Y</span>: 撤销/重做<br>
    <span id="kfCount">关键帧: 0</span> | <span id="playStatus"></span>
  </div>
  <div id="crosshair"></div>
  <div id="selectionRect"></div>
  <div id="brushCursor"></div>
  <div id="exportPanel">
    <h3>导出视频</h3>
    <label>分辨率</label>
    <select id="resSelect">
      <option value="1080" selected>1080p (1920×1080)</option>
      <option value="2160">2K (2560×1440)</option>
      <option value="4320">4K (3840×2160)</option>
    </select>
    <label>帧率 (FPS)</label>
    <input id="fpsInput" type="number" value="30" min="1" max="120">
    <label>总时长 (秒)</label>
    <input id="durationInput" type="number" value="5" min="1" max="300" step="0.5">
    <div id="exportFrameInfo" style="font-size:12px;color:#aaa;margin-top:2px">总帧数: 150</div>
    <label>码率 (Mbps)</label>
    <input id="bitrateInput" type="number" value="10" min="1" max="100" step="1">
    <button id="exportBtn">导出 MP4 视频</button>
    <div id="exportProgress" style="display:none"><div id="exportProgressBar"></div></div>
    <div id="exportStatus"></div>
  </div>
  <div id="editPanel">
    <h3>编辑删除</h3>
    <div class="toolRow">
      <button id="toggleEditBtn">进入编辑 (E)</button>
      <button id="resetViewBtn">Reset 视角</button>
    </div>
    <div class="toolRow">
      <button class="toolBtn" data-tool="picker">Picker (1)</button>
      <button class="toolBtn" data-tool="brush">Brush (2)</button>
    </div>
    <label id="radiusLabel" for="radiusInput">画笔半径 (px)</label>
    <input id="radiusInput" type="number" value="24" min="1" step="1">
    <div id="editHint">模型加载后可进入编辑模式。</div>
    <div class="toolRow">
      <button id="clearSelectionBtn">清空选择 (Esc)</button>
    </div>
    <div class="toolRow">
      <button id="undoBtn">撤销</button>
      <button id="redoBtn">重做</button>
      <button id="deleteSelectionBtn">删除所选 (Del)</button>
    </div>
    <div class="toolRow">
      <button id="saveSceneBtn">保存场景 (.ply)</button>
    </div>
    <div id="saveStatus" style="font-size:12px;color:#aaa;"></div>
    <div id="editStats">
      <div>当前工具: <span id="activeToolLabel">Picker</span></div>
      <div>已选择: <span id="selectionCount">0</span></div>
      <div>已删除: <span id="deletedCount">0</span></div>
    </div>
  </div>
  <script type="module" src="./viewer.js?v=20260421-remove-auto-orbit"></script>
</body>
</html>
